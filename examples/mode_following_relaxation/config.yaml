# Example: DIPAS Precursor Stability Analysis
# Vibrational analysis and automated mode-following structural refinement.

paths:
  adsorbate:      "../../structures/DIPAS.vasp"
  output_prefix:  "dipas_stability"

engine:
  potential:
    backend: "mace"
    device:  "cpu"
    dtype:   "float64"
    model:   null     # null → mace-mp "medium"
    d3:      false

  relaxation:
    fmax:      0.001
    steps:     200
    optimizer: "CG_FIRE"

  md:
    temperature_K: 300
    md_steps:      1000
    damping:       100.0

analysis:
  vibrational:
    displacement_ang: 0.01
    phva_radius_ang:  12.0
    qpoints_file:     null

    mode_refinement:
      enabled:            true
      max_iter:           10
      fmax:               0.001
      steps:              200
      freq_threshold_thz: -0.1
      max_modes:          3
      perturbation_alpha: 0.1
      max_displacement:   0.3
      stagnation_factor:  0.5
      stagnation_epsilon: 0.05

    visualization:
      enabled:    true
      n_frames:   10
      output_dir: "mode_animations"

    symmetry:
      enabled: true
      symprec: 1.0e-5
