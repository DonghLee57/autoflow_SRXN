# Example: DIPAS Precursor Stability Analysis
# Vibrational analysis and automated mode-following structural refinement.

paths:
  precursor:      "../../structures/DIPAS.vasp"
  output_prefix:  "dipas_stability"

engine:
  potential:
    backend: "mace"
    device:  "cpu"
    dtype:   "float32"
    model:   null     # null -> mace-mp "medium"

  relaxation:
    optimizer: "CG_FIRE"

analysis:
  vibrational:
    displacement_ang: 0.005
    phva_radius_ang:  15.0
    qpoints_file:     null

    mode_refinement:
      enabled:            true
      max_iter:           5
      fmax:               0.001
      steps:               500
      freq_threshold_thz: -0.1
      max_modes:          3
      perturbation_alpha: 0.5
      max_displacement:   1.0
      stagnation_factor:  0.5
      stagnation_epsilon: 0.05

    visualization:
      enabled:     true
      n_frames:    10
      output_traj: "relaxation.extxyz"

    symmetry:
      enabled: true
      symprec: 1.0e-5

