# Thermochemistry config for H2 (Ideal Gas)
# mass and moments are specified manually here because no structure file is provided.
# sigma=2 is correct for H2 (D∞h symmetry); spglib auto-detection would give the
# same result if a structure file were set in paths.adsorbate.

paths:
  adsorbate: null   # Set to H2 structure file to enable auto-computation

analysis:
  thermochemistry:
    qpoints_file:      "sample_data/qpoints_H2.yaml"
    mode:              "gas"
    temperatures_K:    [298.15, 400.0, 500.0, 600.0, 700.0, 800.0, 900.0, 1000.0]
    gas:
      mass:    2.016       # amu — override (required when paths.adsorbate is null)
      sigma:   2           # D∞h: rotational symmetry number
      moments: [0.280]     # amu·Å² (linear molecule: one moment)
    adsorbent:
      electronic_energy: -6.772  # eV (MACE-MP-0 energy for H2)
