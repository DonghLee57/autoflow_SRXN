# PHVA vs FHVA Benchmark Configuration: SiO2(001) + DIPAS
# Asymmetric Termination: O-terminated (Top/Bottom), H-passivated (Bottom only)

paths:
  bulk_substrate: "../../structures/SiO2_mp-546794.vasp"
  adsorbate: "../../structures/DIPAS.vasp"
  output_dir: "results"

substrate_generation:
  miller_indices: [0, 0, 1]
  thickness: 15.0
  vacuum: 15.0
  target_area: 200.0  # ~15x13 A
  top_termination: "O"
  bottom_termination: "O"
  verbose: True

passivation:
  run_passivation: True
  element: "H"
  side: "bottom"
  coverage: 1.0

equilibration:
  temp_K: 500
  md_steps: 2000  # 2ps for faster verification
  fixed_z_threshold: 5.5

adsorption:
  sampling_rotations: 16
  physisorption_height: 3.5
  precursor_center: "Si"
  overlap_cutoff: 1.5

potentials:
  model_type: "mace"
  device: "cpu"

relaxation:
  fmax: 0.05
  steps: 200
  optimizer: "BFGS"

thermo:
  temperature_K: 298.15
  phva_cutoff_dist: 3.5
