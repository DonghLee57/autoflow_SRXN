# PHVA vs FHVA Benchmark: Free Energy of Adsorption on SiO2(001) + DIPAS
# Asymmetric termination: O-terminated top, H-passivated bottom

paths:
  substrate_bulk: "../../structures/SiO2_mp-546794.vasp"
  substrate_slab: null
  adsorbate:      "../../structures/DIPAS.vasp"
  inhibitor:      null
  output_dir:     "results"
  output_prefix:  "results"

engine:
  potential:
    backend: "mace"
    device:  "cpu"
    dtype:   "float64"   # float64 recommended for geometry opt and vibrational Hessians
    model:   null        # null → mace-mp "medium"
    d3:      false

  relaxation:
    fmax:      0.001
    steps:     1000
    optimizer: "BFGS"

  md:
    temperature_K: 500
    md_steps:      2000
    damping:       100.0

surface_prep:
  slab_generation:
    enabled:            true
    miller:             [0, 0, 1]
    thickness_ang:      15.0
    vacuum_ang:         15.0
    target_area_ang2:   250.0
    top_termination:    "O"
    bottom_termination: "O"
    supercell_matrix:   null

  passivation:
    enabled:   true
    element:   "H"
    side:      "bottom"
    coverage:  1.0

  surface_analysis:
    symprec: 0.2
    ideal_coordination:
      Si: 4
      O:  2
      N:  3
      C:  4
      H:  1

  slab_relaxation:
    enabled: true

  equilibration:
    enabled:      true
    frozen_z_ang: 5.5

reaction_search:
  mechanisms:
    physisorption:
      enabled:          true
      placement_height: 3.5
      rot_steps:        16

    chemisorption:
      enabled:          false
      precursor_center: "Si"
      rot_steps:        8

    inhibition:
      enabled:          false
      inhibitor_center: "O"
      branching_limit:  5

    protector_exchange:
      enabled:         false
      reactive_leaves: []
      cavity_grid_ang: 0.2

  candidate_filter:
    overlap_cutoff: 1.5
    symprec:        0.2

  candidate_relaxation:
    enabled: true

analysis:
  vibrational:
    displacement_ang: 0.005
    phva_radius_ang:  12.0
    qpoints_file:     null

    mode_refinement:
      enabled:            false
      max_iter:           10
      fmax:               0.001
      steps:              500
      freq_threshold_thz: -0.1
      max_modes:          3
      perturbation_alpha: 0.1
      max_displacement:   0.3
      stagnation_factor:  0.5
      stagnation_epsilon: 0.05

    visualization:
      enabled:    true
      n_frames:   10
      output_dir: "mode_anims"

    symmetry:
      enabled: true
      symprec: 1.0e-4

  thermochemistry:
    temperatures_K: [298.15]
    gas: {}   # mass, moments, and sigma auto-computed from paths.adsorbate
    adsorbent:
      electronic_energy: 0.0
