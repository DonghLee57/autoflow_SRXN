# =============================================================================
# Practical Config: Ethanol (Physi) + DIPAS (Physi/Chemi) on Si(110)
# =============================================================================

paths:
  substrate_bulk: "../../structures/Si_mp149.vasp"
  adsorbate: "../../structures/DIPAS.vasp"
  inhibitor: "../../structures/ethanol.vasp"
  include_no_inhibitor: true
  output_prefix: "results"
  restart: true

surface_prep:
  slab_generation:
    enabled: true
    miller: [1, 1, 0]  # Targeted Si(110) surface
    thickness_ang: 12.0 
    vacuum_ang: 15.0
    target_area_ang2: 250.0 
    
  passivation:
    enabled: true
    element: "H"
    side: "bottom"

  slab_relaxation:
    enabled: true
    fmax: 0.1
    steps: 50
    frozen_z_ang: 5.5 # Fix bottom 5.5A

reaction_search:
  mechanisms:
    inhibitor:
      enabled: true
      center: "O"
      physisorption:
        enabled: true
        placement_height: 3.2
        height_mode: "clearance"    # "clearance": lowest atom at height Å above surface
                                    # "center":    rotation center at height Å above surface
        gravity_pull:
          enabled: false            # descend until first vdW contact after initial placement
          step_size: 0.2            # Å per descent step (only relevant if enabled: true)
      branching_limit: 1
      chemisorption:
        enabled: false

    precursor:
      center: "Si"
      physisorption:
        enabled: true
        placement_height: 5.0
        height_mode: "clearance"    # "clearance": lowest atom at height Å above surface
                                    # "center":    rotation center at height Å above surface
        gravity_pull:
          enabled: false            # descend until first vdW contact after initial placement
          step_size: 0.2            # Å per descent step (only relevant if enabled: true)
      chemisorption:
        enabled: true
        rot_steps: 8

  candidate_filter:
    symprec: 0.2
    overlap_scale: 0.65             # Alvarez (2013) vdW fraction: overlap if dist < scale*(r_i+r_j)
                                    # 0.65 ≈ tight physisorption threshold; raise to 0.75 for stricter

verification:
  relaxation:
    enabled: true
    steps: 100
    fmax: 0.05
    frozen_z_ang: 5.5 # Consistent fixing

engine:
  name: "mace"
  parameters:
    model: "medium"
    device: "cpu"
    dtype: "float64"
    d3: true         # Enable dispersion for physisorption stability
