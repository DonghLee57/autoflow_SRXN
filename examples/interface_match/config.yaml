# =============================================================================
# Interface Lattice-Match Example: Si substrate / SiO2 film (Low-Strain Search)
# =============================================================================
# Standalone config for autoflow_srxn.interface.InterfaceWorkflow.
# Optimized to find the ~3.9% strain match between Si(111) and SiO2(001).
# =============================================================================

# ── Input bulk crystal files ─────────────────────────────────────────────────
sub_path:  "../../structures/Si_mp149.vasp"       # Substrate bulk crystal
film_path: "../../structures/SiO2_mp-546794.vasp" # Film bulk crystal

# ── Surface orientations to search ───────────────────────────────────────────
# Targeted search for the known low-strain orientation pair.
sub_millers:
  - [1, 1, 1]
film_millers:
  - [0, 0, 1]

# ── ZSL lattice-match parameters ─────────────────────────────────────────────
# max_det:  25 is required to find the larger coincidence cell for Si(111)//SiO2(001).
max_det: 25

# strain_cutoff: 0.05 (5%) is sufficient for this well-matched pair.
strain_cutoff: 0.05

# max_atoms: 2000 - The coincidence cell for this match is quite large.
max_atoms: 2000

# ── Slab construction ─────────────────────────────────────────────────────────
# min_slab_thickness: 6.0 Angstrom (reduced to keep atom count manageable for large supercell).
min_slab_thickness: 6.0
vacuum: 15.0

# ── Slab stacking ─────────────────────────────────────────────────────────────
interface_gap: 2.0

# ── Output ───────────────────────────────────────────────────────────────────
# build_top_k: Number of top-ranked candidates to build.
#              Set to -1 or null to build ALL candidates found.
build_top_k: 3

# verbose: If true, saves individual sub/film slabs in addition to the stacked interface.
verbose: false

# output_dir: Directory for output files.
output_dir: "results"
