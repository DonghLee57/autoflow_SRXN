# =============================================================================
# AutoFlow-SRXN — Full Configuration Reference
# =============================================================================
# Package purpose:
#   Automated surface reaction pathway explorer for ALD/CVD chemistry.
#   Given a substrate crystal and a precursor molecule, it generates and
#   evaluates all plausible adsorption structures (physisorption, dissociative
#   chemisorption, protector-ligand exchange) through three sequential stages:
#
#   Stage 1 · surface_prep    — build, passivate, and equilibrate the slab
#   Stage 2 · reaction_search — generate and rank adsorption candidates
#   Stage 3 · analysis        — vibrational stability + thermochemical free energies
#
# Potential dependency:
#   Not all sub-steps require an ML potential. Sections that do are marked
#   with [REQUIRES POTENTIAL]. Unmarked sections run on geometry alone,
#   so stages 1 and 2 can be executed without configuring `engine` at all.
# =============================================================================


# -----------------------------------------------------------------------------
# I/O — single source of truth for all file references
# -----------------------------------------------------------------------------
paths:
  # ── Substrate Definitions ─────────────────────────────────────────────────
  substrate_bulk:  "structures/SiO2_mp-546794.vasp"  # Bulk crystal (VASP).
  substrate_slab:  null                              # Pre-built slab (skips generation).

  # ── Batch Discovery & Screening ──────────────────────────────────────────
  # AutoFlow-SRXN supports automated large-scale screening by scanning 
  # directories for molecular structures.
  #
  # 1. Directory Scanning: If adsorbates_dir/inhibitors_dir are set, all 
  #    .vasp, .xyz, and .extxyz files within them are automatically detected.
  # 2. Cross-Product Pairing: The tool performs discovery for ALL possible 
  #    combinations (Precursor X Inhibitor). e.g., 2 precursors and 3 
  #    inhibitors will result in 6 independent workflow runs.
  # 3. Directory Organization: Each pair gets its own output folder named 
  #    '{inhibitor}_on_{precursor}' inside the global output directory.
  # 4. Baseline Comparison: Set 'include_no_inhibitor: true' to automatically 
  #    include a 'Pure Surface' (no inhibitor) case for each precursor.

  adsorbates_dir:  "inputs/precursors"  # Path to dir for automated scanning.
  inhibitors_dir:  "inputs/inhibitors"  # Path to dir for automated scanning.
  include_no_inhibitor: true            # Include 'None_on_Precursor' baseline.

  # ── Individual File Options (Fallback/Legacy) ─────────────────────────────
  # Used if directory scanning is not active or for single-target runs.
  adsorbate:       "structures/DIPAS.vasp"
  inhibitor:       null

  # ── Output Management ─────────────────────────────────────────────────────
  output_dir:      "results"            # Base folder for batch results.
  output_prefix:   "discovery"          # Prefix for inner result files.


# -----------------------------------------------------------------------------
# Global Workflow Control
# -----------------------------------------------------------------------------
# Set to 'true' to force re-calculation even if results exist in the directory.
# If 'false', the workflow skips pairs that already have 'results_final_verified.extxyz'.
restart: false

# -----------------------------------------------------------------------------
# Potential & Simulation Engine Settings
# -----------------------------------------------------------------------------
engine:

  potential:
    # ── Backend ────────────────────────────────────────────────────────────────
    # Choice of machine learning interatomic potential (ML-IAP) backend.
    #
    # "mace"
    #   MACE-MP equivariant message-passing network.  Trained on the Materials
    #   Project trajectory database (89 elements).  Strong general-purpose
    #   baseline for crystalline materials, surfaces, and small molecules.
    #   Internally uses mace.calculators.mace_mp().
    #
    # "sevennet"
    #   SevenNet (7Net) E(3)-equivariant GNN.  Particularly robust for complex
    #   surface environments and catalysis workflows.  Driven via
    #   sevenn.calculator.SevenNetCalculator / SevenNetD3Calculator.
    #   Requires the 'sevenn' package: pip install sevenn.
    #
    # "emt"
    #   Effective Medium Theory — built directly into ASE.  No external
    #   package needed, sub-millisecond evaluation.  Only parameterised for
    #   simple metals (Cu, Ag, Au, Ni, Pd, Pt, Al, C, N, O, H).
    #   Use exclusively for quick workflow smoke-tests.
    backend:  "mace"

    # ── Hardware ───────────────────────────────────────────────────────────────
    # PyTorch compute device.
    # "cpu"  — always available; slower for large systems (> ~200 atoms).
    # "cuda" — requires an NVIDIA GPU + matching CUDA toolkit; strongly
    #           recommended for production runs or MD > 10 000 steps.
    device:   "cpu"

    # ── Model checkpoint ───────────────────────────────────────────────────────
    # Selects which pretrained weights to load.
    #
    # MACE options
    #   null              → "medium-mpa-0" (Materials Project + Alexandria; default)
    #   "small"           → lighter model, faster but slightly less accurate
    #   "medium"          → original MACE-MP-0 medium (mace_mp_0)
    #   "large"           → original MACE-MP-0 large
    #   "medium-0b3"      → MACE-MP-0b3, improved coverage of organic chemistry
    #   "/path/model.pt"  → local checkpoint; must be a MACE-compatible .model file
    #
    # SevenNet options
    #   null              → "7net-0" (universal potential for 89 elements)
    #   "7net-omat24"     → fine-tuned on Open Materials 2024 dataset
    #   "/path/ckpt.pth"  → local SevenNet checkpoint (.pth)
    model:    null

    # ── Floating-point precision ───────────────────────────────────────────────
    # Controls the PyTorch default dtype for MACE and SevenNet.
    #
    # "float32"  Faster (≈2× on CPU, ≈4× on GPU), lower memory.
    #            Sufficient for NVT-MD and coarse geometry screening.
    #            Typical force error vs float64: < 1 meV/Å.
    #
    # "float64"  Double precision.  Required when:
    #            • Geometry optimisation to tight fmax (< 0.05 eV/Å)
    #            • Hessian / vibrational-frequency calculations
    #            • Thermodynamic free-energy comparisons (PHVA / FHVA)
    #            Numerical second derivatives amplify any single-precision noise.
    dtype:    "float64"

    # ── D3 dispersion correction ───────────────────────────────────────────────
    # Adds Grimme's D3(BJ) empirical van der Waals correction to the potential.
    # Improves description of physisorption and π–π stacking interactions
    # that are under-bound by most GGA-based MLIP training sets.
    #
    # MACE    — uses TorchDFTD3Calculator (pip install torch-dftd).
    # SevenNet — uses SevenNetD3Calculator (bundled in sevenn ≥ 0.9).
    # EMT     — not supported; setting has no effect.
    #
    # When to enable:
    #   Physisorption binding energies, weakly-bound molecular precursors,
    #   or any system where vdW interactions contribute > 0.1 eV.
    d3:       false

    # ── SevenNet-specific options ──────────────────────────────────────────────
    # modal
    #   Selects the fidelity head for multi-head SevenNet models.
    #   Required for models such as 7net-omat24 (modal: "omat24") or
    #   multi-property Alexandra models.  Leave null for standard 7net-0.
    modal:    null

    # enable_cueq
    #   Activates the cuEquivariance CUDA kernel for equivariant tensor
    #   contractions.  Provides 2–5× speedup on NVIDIA GPUs.
    #   Requires: pip install cuequivariance cuequivariance-torch
    #   Has no effect on CPU or with EMT / MACE backends.
    enable_cueq:  false

    # enable_flash
    #   Enables FlashAttention-2 for the attention layers present in some
    #   SevenNet architectures.  Reduces GPU memory footprint by ~30 % and
    #   improves throughput for long-range interaction models.
    #   Requires: pip install flash-attn  (CUDA 11.8+ only)
    enable_flash: false

    # ── ZBL short-range repulsion ──────────────────────────────────────────────
    # Layered Ziegler-Biersack-Littmark (ZBL) screened-Coulomb repulsion.
    #
    # Background
    # ----------
    # ML potentials are trained on near-equilibrium structures.  At very short
    # interatomic distances (sub-bonding, r < ~1.5 Å) encountered during
    # aggressive MD or geometry searches, the MLIP energy surface can be
    # unphysical — sometimes even attractive — because no such configurations
    # appeared in the training data.  The ZBL potential provides the correct
    # nuclear repulsion in this regime and prevents catastrophic geometry
    # explosions.
    #
    # Implementation
    # --------------
    # When enabled, the engine builds
    #   SumCalculator([<MLIP calculator>, ZBLCalculator(...)])
    # using ASE's mixing module.  Energies and forces are summed independently,
    # so gradients remain exact.  The ZBL contribution is non-zero only inside
    # cutoff_outer, so it adds negligible overhead for well-prepared structures.
    #
    # Physics
    # -------
    # Pair energy:
    #   V_ZBL(r) = (Z_i · Z_j · e²) / (4πε₀ · r) · Φ(r / a_ij)
    #
    # Universal screening length:
    #   a_ij = 0.4685 Å / (Z_i^0.23 + Z_j^0.23)
    #
    # Universal screening function (4-term fit, ZBL 1985):
    #   Φ(x) = 0.1818·e^(−3.200·x) + 0.5099·e^(−0.9423·x)
    #         + 0.2802·e^(−0.4029·x) + 0.02817·e^(−0.2016·x)
    #
    # Switching function (cubic Hermite, C¹-smooth):
    #   S(r) = 1                              r ≤ cutoff_inner
    #   S(r) = 1 − 3t² + 2t³  (t normalised) cutoff_inner < r < cutoff_outer
    #   S(r) = 0                              r ≥ cutoff_outer
    # Forces are derived analytically from dV/dr · S(r) + V · dS/dr.
    #
    # Supported backend combinations
    # --------------------------------
    #   backend: "mace"     + zbl.enabled: true   →  MACE-MP  + ZBL
    #   backend: "sevennet" + zbl.enabled: true   →  SevenNet + ZBL
    #   backend: "mace", d3: true, zbl.enabled: true  →  MACE + D3 + ZBL
    #   backend: "emt"      + zbl.enabled: true   →  EMT + ZBL (testing only)
    #
    # Per-pair outer cutoff database
    # --------------------------------
    # src/zbl_pairs.json stores element-pair-specific outer switching distances
    # for 14 chemically relevant elements (Al, C, Cl, Cu, Fe, H, Hf, N, O, P,
    # S, Si, Ti, Zr).  Each value is set to approximately the equilibrium bond
    # length (R_cov_i + R_cov_j × 1.056, capped at 0.8–2.8 Å) so that ZBL is
    # essentially inactive at normal bonding distances and only activates at
    # sub-bonding close contacts.  Element pairs not listed in the file fall
    # back to the global cutoff_outer parameter defined below.
    #
    # Cutoff guidelines for surface chemistry
    # -----------------------------------------
    #   Reference bond lengths:  Si–Si 2.35 Å · Si–O 1.64 Å · C–H 1.09 Å
    #                            N–H  1.01 Å · Si–N 1.73 Å · Si–H 1.48 Å
    #
    #   cutoff_inner: 0.5 Å  — well below any covalent bond; ZBL is fully
    #                           active only at extreme nuclear overlap.
    #                           Short bonds (N–H 1.01 Å, O–H 0.96 Å) sit near
    #                           the outer switching end where S ≈ 0, so ZBL
    #                           does not perturb equilibrium geometries.
    #   cutoff_outer: 2.5 Å  — global fallback for pairs absent from the DB.
    #                           Per-pair values in src/zbl_pairs.json typically
    #                           range from 0.8 Å (H–H) to 2.8 Å (heavy metals),
    #                           keeping ZBL inactive at normal bonded distances.
    zbl:
      enabled:       false   # false → pure MLIP  |  true → MLIP + ZBL combination
      cutoff_inner:  0.5     # Å. ZBL weight = 1 (fully active)  for r ≤ cutoff_inner.
      cutoff_outer:  2.5     # Å. Global fallback outer cutoff for pairs not found in
                             #    src/zbl_pairs.json.  ZBL weight = 0 for r ≥ this value.
                             #    Weight transitions smoothly via cubic Hermite between
                             #    cutoff_inner and the pair-specific (or fallback) outer
                             #    cutoff — forces are continuous everywhere.

  # Default geometry optimization settings.
  # Inherited by surface_prep.slab_relaxation and verification.relaxation.
  relaxation:
    fmax:      0.05    # Max-force convergence criterion (eV/Å). Recommended: 0.05 (coarse), 0.01 (tight).
    steps:     200     # Max optimization steps.
    
    # --- Relaxation Algorithms (Optimizers) ---
    # Choice of algorithm significantly impacts convergence stability and speed.
    #
    # "BFGS" (Default)
    #   Standard Quasi-Newton algorithm. Uses Hessian approximation for smooth convergence.
    #   Best for: General surface optimizations and near-equilibrium structures.
    #
    # "LBFGS"
    #   Limited-memory variant of BFGS. 
    #   Best for: Large supercells (> 500 atoms) where storing a full Hessian is costly.
    #
    # "FIRE"
    #   Fast Inertial Relaxation Engine. MD-based damped dynamics.
    #   Best for: Highly unstable initial guesses or when BFGS shoots away due to high forces.
    #
    # "CG_FIRE"
    #   Two-stage hybrid: SciPy's Conjugate Gradient followed by FIRE.
    #   Best for: Escaping from very high-energy configurations before fine-tuning.
    #
    # "GPMin"
    #   Gaussian Process Minimization. Uses ML to learn the potential energy surface.
    #   Best for: Extremely expensive calculators where each force call counts. 
    #   (Note: Can be slower per-step due to GP training overhead).
    optimizer: "BFGS"

    # Atom-freezing constraints applied during every relax() call.
    # Merged additively with any FixAtoms constraints already set on the atoms object.
    # null → no additional constraint is applied.
    frozen_z_ang:     null   # Fix atoms whose z < z_min(atoms) + this value (Å).
    fix_atom_indices: null   # Fix atoms by explicit index list, e.g. [0, 1, 2, 100].

  # Default NVT molecular dynamics settings.
  # Inherited by surface_prep.equilibration.
  md:
    temperature_K: 500     # Thermostat temperature (K).
    timestep_fs:   1.0     # Integration timestep (fs). 1 fs is safe for most systems.
    md_steps:      2000    # Total integration steps.
    damping:       100.0   # Langevin friction timescale (fs).

    # Atom-freezing constraints (same semantics as engine.relaxation above).
    frozen_z_ang:     null
    fix_atom_indices: null


# -----------------------------------------------------------------------------
# Stage 1 — Surface Preparation
# -----------------------------------------------------------------------------
surface_prep:

  # ── Geometry-only ──────────────────────────────────────────────────────────

  slab_generation:
    enabled:            true          # false → load slab directly from paths.substrate_slab
    miller:             [0, 0, 1]     # Miller indices [h, k, l]
    thickness_ang:      15.0          # Slab thickness (Å)
    vacuum_ang:         15.0          # Vacuum padding above and below slab (Å)
    target_area_ang2:   200.0         # Target supercell XY area (Å²). null → minimal unit cell.
                                      # The engine selects the largest possible supercell that does NOT
                                      # exceed this value (<= target_area), while optimizing for a
                                      # square-like aspect ratio.
    supercell_matrix:   null          # Explicit supercell [[a,b],[c,d]]. Overrides target_area if set.
    top_termination:    "O"           # Element required at the top surface
    bottom_termination: "O"           # Element required at the bottom surface
    
    # ── Surface Reconstruction ───────────────────────────────────────────────
    # Surface atoms often rearrange to minimize surface free energy, breaking 
    # the symmetry of the ideal bulk-terminated structure. This block allows 
    # for the automated application of initial geometric perturbations 
    # (Stage 0.5) before the main reaction search.
    reconstruction:
      enabled:  false                # Toggle for automated surface reconstruction logic.

      # Reconstruction Strategy:
      # "auto" (Recommended)
      #   The Intelligent Reconstruction Engine automatically classifies the material 
      #   based on electronegativity and coordination to apply the best-fit pattern:
      #   - Covalent (e.g., Si, Ge, C): Applies Dimerization and Buckling to reduce 
      #     surface energy from dangling bonds.
      #   - Ionic (e.g., Oxides, Salts): Applies Rumpling (vertical displacement where 
      #     cations retract inward and anions bulge outward).
      #   - Metallic: Applies Surface Relaxation (inward layer contraction) and 
      #     random noise to break electronic symmetry.
      #
      # "random_noise"
      #   Applies small random displacements to all surface atoms. This acts as a 
      #   general symmetry breaker, allowing high-fidelity potentials (like MACE) 
      #   to discover unknown reconstructions during subsequent relaxation stages.
      strategy: "auto"

      # Target surface for reconstruction.
      # "top"    : Reconstruct only the top (reactive) surface.
      # "bottom" : Reconstruct only the bottom surface.
      # "both"   : Reconstruct both sides (useful for symmetric thin films).
      side:     "top"

      # --- Strategy-specific Hyperparameters ---
      # Magnitude of vertical displacement (Å) for buckling or rumpling patterns.
      buckling_dist: 0.4
      # Magnitude of lateral displacement (Å) for dimerization (pulling pairs together).
      dimer_dist:    0.6
      # Amplitude (Å) for random displacements in 'random_noise' or 'auto' metallic modes.
      amplitude:     0.1

  passivation:
    enabled:   true
    element:   "H"
    side:      "bottom"  # "top" | "bottom" | "both"
    coverage:  1.0       # Fraction of dangling bonds to saturate (0.0–1.0)

  surface_analysis:
    symprec:             0.2    # Symmetry precision for surface site equivalence (Å)
    ideal_coordination:         # Expected coordination numbers for VSEPR dangling-bond detection
      Si: 4
      O:  2
      N:  3
      C:  4
      H:  1

  # ── Potential-required ─────────────────────────────────────────────────────

  slab_relaxation:               # [REQUIRES POTENTIAL]
    # Equilibration of the substrate surface before adsorption search begins.
    enabled: true
    fmax:    0.05    # Force convergence (eV/Å). Inherits engine.relaxation.fmax if null.
    steps:   100     # Max steps. Inherits engine.relaxation.steps if null.
    frozen_z_ang: 4.0 # Fix bottom layers of the slab during relaxation (Å).

  equilibration:                 # [REQUIRES POTENTIAL]
    enabled:      true
    frozen_z_ang: 5.5    # Fix the bottom part of the slab during MD to simulate bulk substrate.


# -----------------------------------------------------------------------------
# Stage 2 — Reaction Search
# -----------------------------------------------------------------------------
reaction_search:

  # ── Geometry-only ──────────────────────────────────────────────────────────

  # ── Adsorption Mechanisms & Discovery Logic ───────────────────────────────
  # Stage-specific controls for Physisorption and Chemisorption.
  # Note: Global defaults have been removed to ensure strict independent control.
  # Each stage (inhibition/precursor) must define its own mechanism blocks.

  mechanisms:
    # [STAGE 1: INHIBITOR DISCOVERY / SURFACE FUNCTIONALIZATION]
    # This stage simulates the adsorption of inhibitors or functional molecules
    # on the clean surface BEFORE the main precursor is introduced.
    inhibitor:
      enabled:          true
      center:           "O"     # Binding atom in the molecule (Element or index)
      branching_limit:  1       # Number of top inhibited surfaces to pass to Stage 2
      
      # Search Mechanisms for Stage 1 (Inhibitor)
      physisorption:
        enabled:          true
        placement_height: 3.5   # Initial height above top surface layer (Å), see height_mode
        rot_steps:        8     # Fibonacci-sphere sampling orientations
        center:           "com" # "com", "closest", element symbol, or atom index

        # ── Height interpretation mode ──────────────────────────────────────
        # "clearance" (default)
        #   Lowest atom of the molecule is placed exactly placement_height Å
        #   above the top substrate layer.  Physically correct for large
        #   molecules (e.g., DIPAS, ~8 Å extent) where the COM can be far
        #   above the binding atom.  Prevents accidental embedding.
        # "center"
        #   Rotation center (COM or the element specified by `center`) is
        #   placed at placement_height Å above the surface.  Use when you need
        #   a consistent center-to-surface reference across multiple molecules.
        height_mode:      "clearance"

        # ── Optional gravity pull ────────────────────────────────────────────
        # After initial placement, descend the molecule step_size Å per step
        # until the first Alvarez vdW contact (overlap_scale × (r_i + r_j)) or
        # the hard floor (substrate surface + 0.3 Å) is reached.
        # Disabled by default; useful for compact molecules or tight cavities.
        gravity_pull:
          enabled:    false
          step_size:  0.2       # Å per descent step

      chemisorption:
        enabled:          true
        rot_steps:        8     # Rotation attempts for bond-alignment

    # [STAGE 2: MAIN PRECURSOR DISCOVERY]
    # This stage simulates the adsorption of the target ALD/CVD precursor
    # on the surfaces selected from Stage 1.
    precursor:
      center:           "Si"    # Central reactive atom in the molecule

      # Search Mechanisms for Stage 2 (Main Precursor)
      physisorption:
        enabled:          true
        placement_height: 3.5
        rot_steps:        8
        center:           "com"

        # ── Height interpretation mode (same semantics as inhibitor block above)
        height_mode:      "clearance"

        # ── Optional gravity pull ────────────────────────────────────────────
        gravity_pull:
          enabled:    false
          step_size:  0.2       # Å per descent step

      chemisorption:
        enabled:          true
        rot_steps:        8

    # [SPECIAL MECHANISM: PROTECTOR EXCHANGE]
    # Simulates exchange reactions within established protector layers.
    protector_exchange:
      enabled:         false
      reactive_leaves: []       # e.g. ["CH3", "H"]
      cavity_grid_ang: 0.2      # Resolution for void-center search (Å)

  candidate_filter:
    # ── Overlap criterion — Alvarez (2013) vdW radii ─────────────────────────
    # Steric clash is detected when the inter-atomic distance falls below:
    #
    #   d_threshold(i, j) = overlap_scale × (r_vdW,i + r_vdW,j)
    #
    # where r_vdW values are taken from the Alvarez (2013) database
    # (Dalton Trans. 42, 8617-8636, DOI: 10.1039/c3dt50599e).
    # This element-aware criterion automatically accounts for the different
    # spatial extents of H (1.20 Å), Si (2.19 Å), N (1.66 Å), etc.,
    # replacing the previous single-value `overlap_cutoff` distance.
    #
    # overlap_scale guidelines:
    #   0.55 — very permissive: only hard core repulsion rejected
    #   0.65 — recommended default: rejects genuine clashes while allowing
    #           all valid physisorption starting geometries
    #   0.75 — strict: tighter exclusion; may reject valid poses for small
    #           molecules with compact geometries
    #
    # For chemisorption geometry checks, an explicit flat cutoff (e.g.,
    # cutoff=1.4 Å) can still be passed directly to check_overlap(); it
    # overrides the vdW-based threshold for that call only.
    overlap_scale:  0.65

    symprec:        0.2    # Symmetry equivalence cutoff for site deduplication (Å)
    max_pair_dist:  5.0    # Max distance between two dangling-bond sites to form a reaction pair (Å)

  # ── Potential-required ─────────────────────────────────────────────────────

  # [Stage 3: Candidate Verification & Sampling]
  # After candidates are generated geometrically, they can be processed using 
  # ML potentials to find stable minima or sample thermal behavior.
  verification:
    # ── Geometry Optimization ───────────────────────────────────────────────
    relaxation:
      enabled: true
      fmax:    0.05    # Force convergence threshold (eV/Å).
      steps:   50      # Max optimization steps.
      verbose: false

    # ── Thermal Equilibration (MD) ──────────────────────────────────────────
    # Useful for checking the thermal stability of physisorption poses or 
    # discovering spontaneous reaction pathways at elevated temperatures.
    equilibration:
      enabled:        false
      temperature_K:  300      # Simulation temperature (K).
      md_steps:       1000     # Integration steps.
      timestep_fs:    1.0      # Timestep (fs).
      damping:        100.0    # Langevin friction (fs).
      frozen_z_ang:   4.0      # Fix bottom layers during MD (Å).
      post_relax:     true     # Perform final relaxation after MD.

    # ── Selection Filter ────────────────────────────────────────────────────
    # List of specific candidate indices to process (e.g. [0, 12, 45]).
    # If a string is provided, it is evaluated as a Python expression.
    # e.g., "list(range(10)) + [20, 30]" or "np.arange(0, 100, 5)"
    # If null, all candidates are processed.
    selected_indices: null


# -----------------------------------------------------------------------------
# Stage 3 — Analysis
# -----------------------------------------------------------------------------
analysis:

  # ── Potential-required ─────────────────────────────────────────────────────

  vibrational:                   # [REQUIRES POTENTIAL]
    displacement_ang:  0.01      # Finite-difference step for Hessian construction (Å).
    
    # --- PHVA (Partial Hessian Vibrational Analysis) Logic ---
    # The analyzer intelligently decides the calculation scope based on these params:
    # 1. If both are null -> FHVA (Full Hessian, all atoms active).
    # 2. If phva_radius_ang is set -> Include adsorbate + substrate atoms within radius (Å).
    # 3. If frozen_z_ang is set -> Exclude bottom substrate atoms below z_min + threshold (Å).
    #    This is particularly useful to remove noisy imaginary modes from fixed slab parts.
    phva_radius_ang:   6.0       # Neighborhood radius around adsorbate (Å).
    frozen_z_ang:      3.0       # Exclude atoms below this relative height (Å).
    
    # Control displacement cache behavior:
    # true  -> Re-calculate all displacements (deletes existing cache).
    # false -> Resume from existing cache if available (fast restart).
    overwrite:         true

    # phonopy-compatible output:
    # null -> Automatically writes "qpoints.yaml" to the result directory.
    # "path/to/f.yaml" -> Use specific file for following steps.
    qpoints_file:      null

    mode_refinement:             # [REQUIRES POTENTIAL]
      # Advanced stability refinement using linear combination of imaginary modes.
      enabled:            true
      max_iter:           10
      freq_threshold_thz: -0.1   # Follow modes with frequency below this value (THz).
      max_modes:          3      # Max simultaneous modes to follow.
      perturbation_alpha: 0.1    # Displacement magnitude along eigenvector (Å).
      max_displacement:   0.3    # Per-atom displacement safety cap (Å).
      
      # Tighter relaxation than engine.relaxation — explicitly overridden here:
      fmax:  0.005               # eV/Å. High precision required for mode following.
      steps: 500

    visualization:
      # Generate animation frames (extxyz) for the relaxation pathway.
      enabled:    true
      n_frames:   10
      output_traj: "relaxation.extxyz"

  # ── No potential required ──────────────────────────────────────────────────

  thermochemistry:
    # Calculation of Gibbs free energies and ZPE.
    temperatures_K: [298.15, 400.0, 500.0, 600.0, 700.0, 800.0, 900.0, 1000.0]

    gas:
      # Auto-derived via spglib point-group analysis from paths.adsorbate.
      mass:    null
      moments: null
      sigma:   null

    adsorbent:
